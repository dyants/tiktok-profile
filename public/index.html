<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TikTok Profile</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Courier New", monospace;
        background: linear-gradient(135deg, #0a0e27 0%, #1a1a2e 100%);
        color: #00ff00;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      .container {
        width: 100%;
        max-width: 800px;
        background: rgba(0, 0, 0, 0.8);
        border: 2px solid #00ff00;
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        padding: 30px;
      }
      .header {
        text-align: center;
        margin-bottom: 30px;
        position: relative;
      }
      .header h2 {
        color: #00ff00;
        font-size: 28px;
        text-shadow: 0 0 10px #00ff00;
        margin-bottom: 10px;
      }
      .header::before {
        content: ">>> ";
        color: #00ff00;
      }
      .header::after {
        content: " <<<";
        color: #00ff00;
      }
      .input-group {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }
      #username {
        flex: 1;
        background: #000;
        border: 2px solid #00ff00;
        color: #00ff00;
        padding: 12px 15px;
        font-family: "Courier New", monospace;
        font-size: 16px;
        border-radius: 5px;
        outline: none;
        transition: all 0.3s;
      }
      #username:focus {
        box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
        border-color: #00ff88;
      }
      #username::placeholder {
        color: #00aa00;
      }
      button {
        background: #00ff00;
        border: none;
        color: #000;
        padding: 12px 30px;
        font-family: "Courier New", monospace;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        border-radius: 5px;
        transition: all 0.3s;
        text-transform: uppercase;
      }
      button:hover {
        background: #00cc00;
        box-shadow: 0 0 15px rgba(0, 255, 0, 0.8);
        transform: translateY(-2px);
      }
      button:active {
        transform: translateY(0);
      }
      .terminal {
        background: #000;
        border: 2px solid #00ff00;
        border-radius: 5px;
        padding: 20px;
        min-height: 300px;
        max-height: 600px;
        overflow-y: auto;
        position: relative;
      }
      .terminal::before {
        content: "┌─[root@root]─[~]";
        display: block;
        color: #00ff00;
        margin-bottom: 10px;
        font-weight: bold;
      }
      .terminal::after {
        content: "└─$ ";
        display: block;
        color: #00ff00;
        margin-top: 10px;
      }
      #result {
        color: #00ff00;
        font-family: "Courier New", monospace;
        font-size: 14px;
        line-height: 1.6;
        white-space: pre-wrap;
        word-wrap: break-word;
        text-shadow: 0 0 5px rgba(0, 255, 0, 0.3);
      }
      .avatar-image {
        display: block;
        margin: 10px 0 10px 20px;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: 3px solid #00ff00;
        box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
        object-fit: cover;
      }
      .profile-link {
        color: #00ffff;
        text-decoration: none;
        text-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
        transition: all 0.3s;
      }
      .profile-link:hover {
        color: #00ff00;
        text-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
        text-decoration: underline;
      }
      .loading {
        display: none;
        text-align: center;
        color: #00ff00;
        font-size: 18px;
        animation: blink 1s infinite;
      }
      .loading.active {
        display: block;
      }
      @keyframes blink {
        0%,
        50%,
        100% {
          opacity: 1;
        }
        25%,
        75% {
          opacity: 0.5;
        }
      }
      .terminal::-webkit-scrollbar {
        width: 10px;
      }
      .terminal::-webkit-scrollbar-track {
        background: #000;
      }
      .terminal::-webkit-scrollbar-thumb {
        background: #00ff00;
        border-radius: 5px;
      }
      .status {
        color: #00ff00;
        font-size: 12px;
        margin-top: 10px;
        text-align: center;
      }
      .error {
        color: #ff0000 !important;
        text-shadow: 0 0 5px rgba(255, 0, 0, 0.3);
      }
      .highlight {
        color: #00ffff;
      }
      .verified-badge {
        color: #00ffff;
        text-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
      }
      .stat-value {
        color: #ffff00;
        font-weight: bold;
        text-shadow: 0 0 5px rgba(255, 255, 0, 0.3);
      }
      .videos-heading {
        margin-top: 20px;
        color: #00ff00;
        text-shadow: 0 0 5px #00ff00;
        font-family: inherit;
      }
      .videos-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 15px;
        margin-top: 15px;
        padding-top: 15px;
        border-top: 1px dashed #00ff00;
      }
      .video-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid #00ff00;
        border-radius: 5px;
        padding: 5px;
        transition: transform 0.2s;
        text-decoration: none;
      }
      .video-item:hover {
        transform: scale(1.05);
        box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
      }
      .video-thumbnail {
        width: 100%;
        height: 150px;
        object-fit: cover;
        border-radius: 3px;
        margin-bottom: 5px;
      }
      .video-views {
        font-size: 11px;
        color: #ffff00;
        font-family: sans-serif;
        text-shadow: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h2>TikTok Profile</h2>
      </div>

      <div class="input-group">
        <input
          type="text"
          id="username"
          placeholder=" username TikTok..."
          onkeypress="if (event.key === 'Enter') checkProfile();"
        />
        <button onclick="checkProfile()">CEK</button>
      </div>
      <div class="terminal">
        <div class="loading" id="loading">
          [████████████████████] Scanning profile...
        </div>
        <div id="result"></div>
      </div>
      <div class="status" id="status">Ready to scan...</div>
    </div>
    <script src="/main.js"></script>
  </body>
</html>
